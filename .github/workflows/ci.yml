name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    name: Test and Build
    runs-on: ubuntu-latest

    env:
      POSTGRES_PASSWORD: ci-postgres-password
      JWT_SECRET: ci-jwt-secret-long-enough-for-config
      INTERNAL_API_KEY: ci-internal-api-key
      # Matches the default the admin test harness expects
      # (admin/tests/helpers/setup.ts), pointed at the Postgres service below.
      DATABASE_URL: postgresql://postgres:postgres@localhost:5435/agenticms_test

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: agenticms_test
        ports:
          - 5435:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            admin/package-lock.json
            admin/frontend/package-lock.json
            cli/package-lock.json
            website/package-lock.json

      - name: Admin backend
        working-directory: admin
        run: |
          npm ci
          # The admin Vitest run also executes the React tests under
          # admin/frontend (they import react/lucide-react), so those deps
          # must be installed before `npm test`.
          npm ci --prefix frontend
          npm run db:generate
          npm run build:tsc
          npm test
          npm run build

      - name: Admin frontend
        working-directory: admin/frontend
        run: |
          npm ci
          npm run build

      - name: CLI
        working-directory: cli
        run: |
          npm ci
          npm run build
          npm test

      - name: Website
        working-directory: website
        run: |
          npm ci
          npm test
          npm run build:astro

      - name: Docker Compose config
        run: docker compose config
