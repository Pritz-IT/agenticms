name: Publish images

# Builds and pushes the admin and website container images to GHCR.
#
# Triggers:
#   - push tag N.N.N          -> :N.N.N + :N.N + :latest + :sha-<short>
#   - manual (workflow_dispatch) for re-runs
#
# Image builds are release-only: nothing is published on a plain main merge,
# only when a version tag is pushed.
#
# Images (public — first push creates them private; flip visibility once in
# Settings -> Packages, then they stay public):
#   ghcr.io/pritz-it/agenticms-admin
#   ghcr.io/pritz-it/agenticms-website
#
# Both images are built multi-arch (amd64 + arm64) because the live CMS runs on
# an ARM64 Raspberry Pi. arm64 is emulated via QEMU and is the slow part of the
# build — see the note at the bottom of the file for faster alternatives.

on:
  push:
    tags: ["[0-9]+.[0-9]+.[0-9]+"]
  workflow_dispatch:

concurrency:
  group: publish-images-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  OWNER: pritz-it

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: agenticms-admin
            context: .
            dockerfile: admin/Dockerfile
          - image: agenticms-website
            context: ./website
            dockerfile: ./website/Dockerfile
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive tags and labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.OWNER }}/${{ matrix.image }}
          # latest must move only on release tags, never on a plain main push.
          flavor: latest=false
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=short
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/') }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Per-image build cache so the two images don't evict each other.
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}
          # Keep a clean single multi-arch manifest (no extra unknown/unknown
          # provenance entries cluttering the package UI).
          provenance: false

# ── Notes ───────────────────────────────────────────────────────────────────
# • First push creates each GHCR package PRIVATE. Flip to public once in
#   github.com/orgs/Pritz-IT/packages -> <pkg> -> Package settings, and confirm
#   it is linked to this repo (the org.opencontainers.image.source label set by
#   metadata-action links it automatically on first push).
# • arm64 under QEMU is the slow leg (the admin image runs npm ci + prisma
#   generate + tsc + vite across stages, emulated). If build time hurts:
#     - split the matrix to also run on a native arm64 runner, OR
#     - build amd64 here and build/load arm64 on the Pi itself.
# • To also mirror to Docker Hub later: add a second docker/login-action +
#   another image line in metadata-action's `images:` — build-push-action will
#   push the same manifest to both registries in one step.
