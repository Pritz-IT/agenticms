name: Publish images

# Builds and pushes the admin and website container images to GHCR.
#
# Triggers:
#   - push tag N.N.N          -> :N.N.N + :N.N + :latest + :sha-<short>
#   - manual (workflow_dispatch) -> :sha-<short> only (no semver/latest move)
#
# Image builds are release-only: nothing is published on a plain main merge,
# only when a version tag is pushed.
#
# Images (public — first push creates them private; flip visibility once in
# Settings -> Packages, then they stay public):
#   ghcr.io/pritz-it/agenticms-admin
#   ghcr.io/pritz-it/agenticms-website
#
# Both images are built multi-arch (amd64 + arm64) because the live CMS runs on
# an ARM64 Raspberry Pi. arm64 is emulated via QEMU and is the slow part.
#
# NOTE: This org restricts Actions to GitHub-owned / Pritz-IT-owned only, so the
# usual docker/* marketplace actions are NOT allowed. Everything below is driven
# with the docker buildx CLI (preinstalled on ubuntu-latest) plus the only
# third-party action permitted — actions/checkout, which is GitHub-owned.

on:
  push:
    tags: ["[0-9]+.[0-9]+.[0-9]+"]
  workflow_dispatch:

concurrency:
  group: publish-images-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  OWNER: pritz-it

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: agenticms-admin
            context: .
            dockerfile: admin/Dockerfile
          - image: agenticms-website
            context: ./website
            dockerfile: ./website/Dockerfile
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enable arm64 emulation (binfmt)
        run: docker run --privileged --rm tonistiigi/binfmt --install all

      - name: Create buildx builder
        run: docker buildx create --use --name agenticms --driver docker-container

      - name: Log in to GHCR
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: echo "$GHCR_TOKEN" | docker login "$REGISTRY" -u "${{ github.actor }}" --password-stdin

      - name: Build and push
        env:
          MATRIX_IMAGE: ${{ matrix.image }}
          CONTEXT: ${{ matrix.context }}
          DOCKERFILE: ${{ matrix.dockerfile }}
        run: |
          set -euo pipefail
          IMAGE="${REGISTRY}/${OWNER}/${MATRIX_IMAGE}"
          SHORT_SHA="${GITHUB_SHA::7}"

          # Always publish an immutable sha tag.
          TAG_ARGS=(-t "${IMAGE}:sha-${SHORT_SHA}")

          # On a version tag, add semver + minor + latest (mirrors the previous
          # metadata-action behaviour). A manual dispatch on a branch gets only
          # the sha tag, so it can never move :latest.
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            VERSION="${GITHUB_REF_NAME}"
            MINOR="$(echo "$VERSION" | cut -d. -f1,2)"
            TAG_ARGS+=(-t "${IMAGE}:${VERSION}" -t "${IMAGE}:${MINOR}" -t "${IMAGE}:latest")
          fi

          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            --push \
            "${TAG_ARGS[@]}" \
            --label "org.opencontainers.image.source=https://github.com/${GITHUB_REPOSITORY}" \
            --label "org.opencontainers.image.revision=${GITHUB_SHA}" \
            --cache-from "type=registry,ref=${IMAGE}:buildcache" \
            --cache-to "type=registry,ref=${IMAGE}:buildcache,mode=max" \
            --provenance=false \
            -f "${DOCKERFILE}" \
            "${CONTEXT}"

# ── Notes ───────────────────────────────────────────────────────────────────
# • First push creates each GHCR package PRIVATE. Flip to public once in
#   github.com/orgs/Pritz-IT/packages -> <pkg> -> Package settings. The
#   org.opencontainers.image.source label links the package to this repo.
# • Build cache lives as a `:buildcache` tag on each GHCR image (registry cache,
#   works with the docker login above — the gha cache backend would need the
#   setup-buildx-action we're not allowed to use).
# • arm64 under QEMU is the slow leg (admin runs npm ci + prisma generate + tsc
#   + vite across stages, emulated). If it hurts, add a native arm64 runner to
#   the matrix or build arm64 on the Pi itself.
